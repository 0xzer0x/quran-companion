name: quran-companion
base: core24
version: 1.5.0
title: Quran Companion
summary: Read and listen to the Quran
description: Quran Companion is a cross-platform Quran reader and player with recitation download capabilities, verse highlighting, re-sizable Quran font, and a variety of tafsir books and translations.
license: LGPL-3.0+
icon: dist/xdg/logo256.png
website: https://0xzer0x.github.io/projects/quran-companion
source-code: https://github.com/0xzer0x/quran-companion
issues: https://github.com/0xzer0x/quran-companion/issues
contact: https://0xzer0x.github.io/contact
grade: stable
confinement: strict
platforms:
  amd64:
    build-on:
      - amd64
    build-for:
      - amd64
lint:
  ignore:
    - classic
    - library
apps:
  quran-companion:
    command-chain: [bin/desktop-launch]
    command: usr/bin/quran-companion
    common-id: io.github._0xzer0x.qurancompanion
    desktop: usr/share/applications/io.github._0xzer0x.qurancompanion.desktop
    environment:
      QT_VERSION: 6.10.2
      QT_PATH: "$SNAP/opt/qt6/$QT_VERSION/gcc_64"
      QT_PLUGIN_PATH: "$QT_PATH/plugins"
      QML2_IMPORT_PATH: "$QT_PATH/qml"
      QT_QPA_PLATFORM: "wayland;xcb"
      QT_QPA_PLATFORMTHEME: "xdgdesktopportal"
      PULSE_RUNTIME_PATH: "$XDG_RUNTIME_DIR/../pulse"
      WAYLAND_DISPLAY: "$XDG_RUNTIME_DIR/../wayland-0"
      LD_LIBRARY_PATH: "$QT_PATH/lib:$SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/pulseaudio:$SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
    plugs:
      - desktop
      - desktop-legacy
      - audio-playback
      - gsettings
      - network
      - opengl
      - wayland
      - x11
hooks:
  configure:
    command-chain:
      - bin/hooks-configure-desktop
    plugs:
      - desktop
layout:
  /usr/share/X11:
    symlink: $SNAP/usr/share/X11
plugs:
  desktop:
    mount-host-font-cache: false
  icon-themes:
    interface: content
    target: $SNAP/data-dir/icons
    default-provider: gtk-common-themes
  sound-themes:
    interface: content
    target: $SNAP/data-dir/sounds
    default-provider: gtk-common-themes
parts:
  qt:
    plugin: nil
    build-environment:
      - QT_VERSION: 6.10.2
      - QT_ARCH: linux_gcc_64
      - QT_MODULES: qtimageformats qtmultimedia qtnetworkauth
    build-snaps:
      - astral-uv
    stage-packages:
      - libxcomposite1
      - libxcursor1
      - libaudio2
      - libao4
      - libpcaudio0
      - libasound2t64
      - libavdevice60
      - libwebpmux3
      - libvpx9
      - libvorbisfile3
      - libvdpau1
      - libva-x11-2
      - libudfread0
      - libtwolame0
      - libtheora0
      - libswscale7
      - libswresample4
      - libspeex1
      - libsodium23
      - libsnappy1v5
      - libshine3
      - librsvg2-2
      - libpgm-5.3-0
      - libopenmpt0
      - libopenjp2-7
      - libnuma1
      - libnorm1
      - libmpg123-0
      - libmfx1
      - libgme0
      - libdav1d7
      - libchromaprint1
      - libcodec2-1.2
      - libbluray2
      - libavutil58
      - libavformat60
      - libavcodec60
      - libaom3
      - ocl-icd-libopencl1
      - libpulse0
      - libdbus-1-3
      - libgl1
      - libegl1
      - libfontconfig1
      - libfreetype6
      - libglx0
      - libgtk-3-0
      - libharfbuzz0b
      - libice6
      - libicu74
      - liblcms2-2
      - libopengl0
      - libpcre2-16-0
      - libpng16-16
      - libsm6
      - libssl3
      - libvulkan1
      - libwayland-client0
      - libwayland-cursor0
      - libwayland-egl1
      - libx11-6
      - libx11-xcb1
      - libxcb1
      - libxcb-cursor0
      - libxcb-glx0
      - libxcb-icccm4
      - libxcb-image0
      - libxcb-keysyms1
      - libxcb-randr0
      - libxcb-render0
      - libxcb-render-util0
      - libxcb-shape0
      - libxcb-shm0
      - libxcb-sync1
      - libxcb-util1
      - libxcb-xfixes0
      - libxcb-xkb1
      - libxkbcommon0
      - libxkbcommon-x11-0
      - xkb-data
      - zlib1g
    override-build: |-
      uvx --from aqtinstall \
        aqt install-qt linux desktop "${QT_VERSION}" "${QT_ARCH}" \
        --outputdir "${CRAFT_PART_INSTALL}/opt/qt6" \
        -m ${QT_MODULES}
    prime:
      - -opt/qt6/$QT_VERSION/gcc_64/doc/**
      - -opt/qt6/$QT_VERSION/gcc_64/examples/**
      - -opt/qt6/$QT_VERSION/gcc_64/translations/**
      - -opt/qt6/$QT_VERSION/gcc_64/lib/cmake/**
      - -opt/qt6/$QT_VERSION/gcc_64/lib/pkgconfig/**
      - -opt/qt6/$QT_VERSION/gcc_64/lib/*.a
      - -opt/qt6/$QT_VERSION/gcc_64/lib/*.la
  quran-companion:
    after:
      - qt
    source: .
    source-type: git
    source-tag: v$SNAPCRAFT_PROJECT_VERSION
    source-depth: 1
    parse-info:
      - usr/share/metainfo/io.github._0xzer0x.qurancompanion.metainfo.xml
    build-environment:
      - QT_VERSION: 6.10.2
      - QT_PATH: "$CRAFT_STAGE/opt/qt6/$QT_VERSION/gcc_64"
    plugin: cmake
    cmake-generator: Ninja
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_PREFIX_PATH="$QT_PATH"
    build-packages:
      - libpulse-dev
      - libsqlite3-dev
      - libegl-dev
      - libfontconfig1-dev
      - libfreetype-dev
      - libglib2.0-dev
      - libglx-dev
      - libvulkan-dev
      - libxcb1-dev
      - libxcb-cursor-dev
      - libxkbcommon-dev
    stage-packages:
      - libpulse0
      - libfontconfig1
      - libfreetype6
      - libgl1
      - libegl1
      - libopengl0
      - libgtk-3-0
      - libgtk-3-common
    prime:
      - usr/bin
      - usr/share
  desktop-qt:
    after:
      - quran-companion
    source: https://github.com/desktop-app/snapcraft-desktop-helpers.git
    source-depth: 1
    source-subdir: qt
    plugin: make
    make-parameters: ["FLAVOR=qt5"]
    build-environment:
      - LD_LIBRARY_PATH: $CRAFT_STAGE/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}
    build-packages:
      - build-essential
      - dpkg-dev
      - gtk-update-icon-cache
      - libglib2.0-bin
      - libgtk-3-0
    stage-packages:
      - libc-bin
      - libgdk-pixbuf-2.0-0
      - libnvidia-egl-wayland1
      - libxkbcommon0
      - locales-all
      - shared-mime-info
      - xdg-user-dirs
    override-prime: |
      craftctl default
      update-mime-database usr/share/mime
      glib-compile-schemas usr/share/glib-2.0/schemas
      for theme in usr/share/icons/*; do
        if [ -f "$theme/index.theme" ] && [ ! -f "$theme/icon-theme.cache" ]; then
          update-icon-caches "$theme"
        fi
      done
