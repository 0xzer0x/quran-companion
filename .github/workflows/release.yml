name: Release
on:
  push:
    tags:
      - "v*.*.*"
concurrency:
  group: "${{ github.workflow }}"
  cancel-in-progress: true
env:
  BUILD_TYPE: Release
  QT_INSTALL_VERSION: 6.10.2
  QT_INSTALL_MODULES: >-
    qtimageformats
    qtmultimedia
    qtnetworkauth
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: "${{ steps.setversion.outputs.version }}"
    steps:
      - name: Checkout VERSION
        uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: VERSION
          sparse-checkout-cone-mode: false

      - name: Set environmental variables
        run: |
          echo "RELEASE_VERSION=$(cat "${{ github.workspace }}/VERSION")" >> "$GITHUB_ENV"
          echo "TAG_VERSION=$(echo "${{ github.ref_name }}" | cut -d'v' -f2)" >> "$GITHUB_ENV"
          echo "MAIN_SHA=$(git rev-parse --verify main)" >> "$GITHUB_ENV"

      - name: Check release version and commit sha
        run: |
          echo "::group::Check tag commit matches latest commit on main"
          if [[ "$GITHUB_SHA" != "$MAIN_SHA" ]]; then
            echo "::error title=Commit mismatch::Latest commit on main ($MAIN_SHA) does not match tag commit ($GITHUB_SHA)"
            exit 1
          fi
          echo "::endgroup::"
          echo "::group::Check release version matches tag"
          if [[ "$RELEASE_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error title=Version mismatch::Release version ($RELEASE_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "::endgroup::"

      - name: Set application version
        id: setversion
        run: echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

  build-appimage:
    needs:
      - prepare
    runs-on: ubuntu-latest
    environment:
      name: Linux - AppImage
      url: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Quran_Companion-${{ needs.prepare.outputs.version }}-x86_64.AppImage
    env:
      APP_VER: "${{ needs.prepare.outputs.version }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          submodules: true

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          cache: true
          host: linux
          target: desktop
          arch: linux_gcc_64
          version: "${{ env.QT_INSTALL_VERSION }}"
          modules: "${{ env.QT_INSTALL_MODULES }}"

      - name: Install tools
        run: |-
          sudo apt update -y && sudo apt install wget fuse libxcb-cursor0 appstream appstream-util ninja-build -y
          wget https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          wget https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage
          chmod +x linuxdeployqt-continuous-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Prepare AppDir
        run: >-
          mkdir -p QuranCompanion.AppDir/usr/{bin,share/{applications,metainfo,icons/hicolor/256x256/apps}}

          cp
          ${{github.workspace}}/dist/xdg/io.github._0xzer0x.qurancompanion.desktop
          QuranCompanion.AppDir/

          cp ${{github.workspace}}/dist/xdg/logo256.png
          QuranCompanion.AppDir/io.github._0xzer0x.qurancompanion.png

          cp
          ${{github.workspace}}/dist/xdg/io.github._0xzer0x.qurancompanion.desktop
          QuranCompanion.AppDir/usr/share/applications/

          cp ${{github.workspace}}/dist/xdg/logo256.png
          QuranCompanion.AppDir/usr/share/icons/hicolor/256x256/apps/io.github._0xzer0x.qurancompanion.png

          cp ${{github.workspace}}/dist/xdg/io.github._0xzer0x.qurancompanion.metainfo.xml
          QuranCompanion.AppDir/usr/share/metainfo/io.github._0xzer0x.qurancompanion.appdata.xml

          echo -e "[Paths]\nPlugins = ../plugins\nLibraries = ../lib\nImports =
          ../qml\nQml2Imports = ../qml" > QuranCompanion.AppDir/usr/bin/qt.conf

      - name: Configure
        run: >-
          cmake -B ${{github.workspace}}/build
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

      - name: Build
        run: "cmake --build ${{github.workspace}}/build"

      - name: Install
        run: >-
          cmake --install ${{github.workspace}}/build --prefix
          QuranCompanion.AppDir/usr

      - name: Run linuxdeployqt
        run: >-
          find "${QT_PLUGIN_PATH}/imageformats" -name 'libqtiff.so' -type f -delete

          find "${QT_PLUGIN_PATH}/sqldrivers" -not -name 'libqsqlite.so' -type f -delete

          ${{github.workspace}}/linuxdeployqt-continuous-x86_64.AppImage
          QuranCompanion.AppDir/usr/bin/quran-companion
          -unsupported-allow-new-glibc -qmake=$(which qmake) -no-translations
          -extra-plugins=sqldrivers,iconengines,imageformats,multimedia,networkinformation,platforms,platformthemes,wayland-decoration-client,wayland-graphics-integration-client,wayland-shell-integration,xcbglintegrations,egldeviceintegrations
          -verbose=1

      - name: Make AppImage
        run: >-
          ${{github.workspace}}/appimagetool-x86_64.AppImage -n QuranCompanion.AppDir
          Quran_Companion-${{env.APP_VER}}-x86_64.AppImage

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: "Quran_Companion-${{env.APP_VER}}-x86_64.AppImage"
          retention-days: 7

  build-dmg:
    needs:
      - prepare
    runs-on: macos-14
    environment:
      name: MacOS - DMG
      url: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Quran_Companion-${{ needs.prepare.outputs.version }}-x86_64.dmg
    env:
      APP_VER: "${{ needs.prepare.outputs.version }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          submodules: true

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          cache: true
          host: mac
          target: desktop
          arch: clang_64
          version: "${{ env.QT_INSTALL_VERSION }}"
          modules: "${{ env.QT_INSTALL_MODULES }}"

      - name: Install tools
        run: |-
          brew install graphicsmagick imagemagick
          npm install --global create-dmg

      - name: Configure
        run: >-
          cmake -B ${{github.workspace}}/build
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

      - name: Make DMG
        run: |-
          find "${QT_PLUGIN_PATH}/sqldrivers" -mindepth 1 \
            -not -name 'libqsqlite.dylib' \
            -not -name 'libqsqlite.dylib.dSYM' \
            -delete

          cd "${{github.workspace}}/build"
          macdeployqt quran-companion.app
          create-dmg --dmg-title="Install Quran Companion" quran-companion.app || true

          QC_DMG="$(find . -maxdepth 1 -name "Quran Companion*.dmg" | head -n 1)"
          if [[ -n "${QC_DMG}" ]]; then
            mv "${QC_DMG}" "${{ github.workspace }}/Quran_Companion-${{env.APP_VER}}-x86_64.dmg"
          else
            echo "DMG file not found!"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: "Quran_Companion-${{env.APP_VER}}-x86_64.dmg"
          retention-days: 7

  build-installer:
    needs:
      - prepare
    runs-on: windows-latest
    environment:
      name: Windows - Installer
      url: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Quran_Companion-${{ needs.prepare.outputs.version }}-x86_64-setup.exe
    env:
      APP_VER: "${{ needs.prepare.outputs.version }}"
      BUNDLE_DIR: '${{ github.workspace }}\bundle'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          submodules: true

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          cache: true
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          version: "${{ env.QT_INSTALL_VERSION }}"
          modules: "${{ env.QT_INSTALL_MODULES }}"

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y
          $env:Path += ';C:\Program Files (x86)\NSIS'
          'C:\Program Files (x86)\NSIS' | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          $nsisVersion = (& makensis /VERSION 2>&1 | Select-Object -First 1).Trim()
          Write-Host "NSIS version: $nsisVersion"

      - name: Configure
        shell: pwsh
        run: cmake -G Ninja -DCMAKE_BUILD_TYPE="${{ env.BUILD_TYPE }}" -B build

      - name: Build
        shell: pwsh
        run: cmake --build build --config "${{ env.BUILD_TYPE }}"

      - name: Install to bundle directory
        shell: pwsh
        run: |-
          cmake --install build --config "${{ env.BUILD_TYPE }}" --prefix "${{ env.BUNDLE_DIR }}"

          # FIX: Required for proper displaying of Arabic text in installer
          $bundle = "${{ env.BUNDLE_DIR }}\bin"
          $licenses = @(
            "license-en.txt",
            "license-ar.txt"
          )
          foreach ($file in $licenses) {
            $src = Join-Path "${{ github.workspace }}" $file
            $dst = Join-Path $bundle $file
            # Rewrite license file as UTF-8 with BOM
            $content = Get-Content $src -Raw
            Set-Content -Path $dst -Value $content -Encoding utf8BOM
          }

      - name: Run windeployqt
        shell: pwsh
        run: windeployqt.exe -no-translations --release --dir "${{ env.BUNDLE_DIR }}\bin" "${{ env.BUNDLE_DIR }}\bin\quran-companion.exe"

      - name: Build NSIS installer
        shell: pwsh
        run: |-
          Push-Location "${{ env.BUNDLE_DIR }}\bin"
          Copy-Item -Path "${{ github.workspace }}\dist\windows\installer\installer.nsi" -Destination "installer.nsi" -Force
          makensis /V4 /DAPPVER="${{ env.APP_VER }}" /DOUTFILE="${{ env.BUNDLE_DIR }}\Quran_Companion-${{ env.APP_VER }}-x86_64-setup.exe" installer.nsi
          Pop-Location

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: '${{ env.BUNDLE_DIR }}\Quran_Companion-${{ env.APP_VER }}-x86_64-setup.exe'
          retention-days: 7

  release:
    needs:
      - prepare
      - build-appimage
      - build-dmg
      - build-installer
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      APP_VER: "${{ needs.prepare.outputs.version }}"
    steps:
      - name: Checkout CHANGELOG.md
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          sparse-checkout-cone-mode: false
          sparse-checkout: CHANGELOG.md

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Verify artifacts
        run: |-
          echo "::group::Checking release artifacts"
          if [[ ! -f "Quran_Companion-${{env.APP_VER}}-x86_64.AppImage" || ! -f "Quran_Companion-${{env.APP_VER}}-x86_64.dmg" || ! -f "Quran_Companion-${{env.APP_VER}}-x86_64-setup.exe" ]]; then
            echo "::error title=Missing Artifact::One of the platform build artifacts is missing"
            echo -e "Files listing:\n$(ls -la)" >&2
            exit 1
          fi
          echo "::endgroup::"

      - name: Generate attestations
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            Quran_Companion-${{env.APP_VER}}-x86_64.AppImage
            Quran_Companion-${{env.APP_VER}}-x86_64.dmg
            Quran_Companion-${{env.APP_VER}}-x86_64-setup.exe

      - name: Generate checksums
        run: |-
          b2sum "Quran_Companion-${{env.APP_VER}}-x86_64.AppImage" > "Quran_Companion-${{env.APP_VER}}-x86_64.AppImage.b2sum"
          b2sum "Quran_Companion-${{env.APP_VER}}-x86_64.dmg" > "Quran_Companion-${{env.APP_VER}}-x86_64.dmg.b2sum"
          b2sum "Quran_Companion-${{env.APP_VER}}-x86_64-setup.exe" > "Quran_Companion-${{env.APP_VER}}-x86_64-setup.exe.b2sum"

      - name: Release
        uses: ncipollo/release-action@v1.13.0
        with:
          name: "${{ github.ref_name }}"
          tag: "${{ github.ref_name }}"
          bodyFile: CHANGELOG.md
          artifacts: "Quran_Companion-${{env.APP_VER}}-x86_64*"

  aur:
    needs:
      - prepare
      - release
    runs-on: ubuntu-latest
    environment:
      name: AUR
      url: https://aur.archlinux.org/packages/quran-companion
    env:
      APP_VER: "${{ needs.prepare.outputs.version }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            dist/aur/pkgbuildgen.awk
            dist/aur/PKGBUILD.in

      - name: Download AppImage
        uses: actions/download-artifact@v4
        with:
          name: appimage

      - name: Generate PKGBUILD
        run: |
          APPIMAGE_B2SUM="$(b2sum Quran_Companion-${{env.APP_VER}}-x86_64.AppImage | cut -d' ' -f1)"
          awk \
            -v "pkgver=${{ env.APP_VER }}" \
            -v "b2sum=${APPIMAGE_B2SUM}" \
            -f dist/aur/pkgbuildgen.awk \
            dist/aur/PKGBUILD.in > PKGBUILD

      - name: Publish AUR package
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.1
        with:
          pkgname: quran-companion
          pkgbuild: PKGBUILD
          ssh_private_key: "${{ secrets.AUR_KEY }}"
          commit_email: "${{ vars.AUR_EMAIL }}"
          commit_username: "${{ vars.AUR_USERNAME }}"
          commit_message: "release: update to version ${{ env.APP_VER }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
